version: '3.8'

services:
  web:
    build: .
    container_name: library_web
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
    command: apache2-foreground    
  db:
    image: mysql:8.0
    container_name: library_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: library_db
    ports:
      - "3306:3306"
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: my-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_ARBITRARY: 1
    ports:
      - "8082:80"
    restart: always
